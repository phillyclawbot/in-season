<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C42"/>
      <stop offset="50%" style="stop-color:#FFB347"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <!-- Fruit bowl / seasonal wheel suggestion -->
  <!-- Large fruit circle (orange-like) -->
  <circle cx="256" cy="276" r="148" fill="#FF6B35" opacity="0.9"/>
  <circle cx="256" cy="276" r="148" fill="none" stroke="#FFD4A3" stroke-width="12" opacity="0.4"/>
  <!-- Highlight -->
  <ellipse cx="216" cy="228" rx="42" ry="28" fill="white" opacity="0.22" transform="rotate(-30 216 228)"/>
  <!-- Leaf -->
  <ellipse cx="256" cy="108" rx="28" ry="52" fill="url(#leaf)" transform="rotate(-15 256 108)"/>
  <ellipse cx="278" cy="100" rx="18" ry="44" fill="url(#leaf)" transform="rotate(20 278 100)"/>
  <!-- Stem -->
  <rect x="251" y="120" width="10" height="32" rx="5" fill="#2E7D32"/>
  <!-- Inner segments hint -->
  <path d="M256 276 L256 145" stroke="#FF5722" stroke-width="3" opacity="0.3"/>
  <path d="M256 276 L370 215" stroke="#FF5722" stroke-width="3" opacity="0.3"/>
  <path d="M256 276 L370 337" stroke="#FF5722" stroke-width="3" opacity="0.3"/>
  <path d="M256 276 L256 407" stroke="#FF5722" stroke-width="3" opacity="0.3"/>
  <path d="M256 276 L142 337" stroke="#FF5722" stroke-width="3" opacity="0.3"/>
  <path d="M256 276 L142 215" stroke="#FF5722" stroke-width="3" opacity="0.3"/>
</svg>
